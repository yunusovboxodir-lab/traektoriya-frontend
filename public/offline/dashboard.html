<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSPM Dashboard — N'Medov Sales Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --sand: #f5f0e8; --sand-dark: #e8e0d0; --warm: #d4c5a9;
  --charcoal: #2d2a26; --charcoal-light: #4a453d;
  --gold: #c8a835; --gold-light: #e0c94f;
  --red: #c0392b; --red-light: #e74c3c;
  --teal: #1a8a7d; --blue: #2c6fbb; --orange: #d4731a; --green: #27864a;
  --cream: #faf7f0; --text: #2d2a26; --text-dim: #7a7267; --white: #ffffff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:var(--charcoal);padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-logo{width:48px;height:48px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:22px;flex-shrink:0}
.header h1{font-family:'DM Serif Display',serif;color:var(--sand);font-size:clamp(18px,3vw,28px)}
.header p{color:rgba(255,255,255,.5);font-size:13px;width:100%}

/* CONTROLS */
.controls{padding:16px 24px;background:var(--cream);border-bottom:1px solid var(--sand-dark);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.ctrl-input{padding:10px 14px;border:2px solid var(--sand-dark);border-radius:10px;font-family:'DM Sans';font-size:13px;background:var(--white);color:var(--text);transition:border-color .2s;min-width:200px}
.ctrl-input:focus{border-color:var(--gold);outline:none}
.ctrl-btn{padding:10px 20px;border:none;border-radius:10px;font-family:'DM Sans';font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.ctrl-btn-primary{background:var(--gold);color:var(--charcoal)}.ctrl-btn-primary:hover{background:var(--gold-light)}
.ctrl-btn-secondary{background:var(--charcoal);color:var(--sand)}.ctrl-btn-secondary:hover{background:var(--charcoal-light)}
.ctrl-status{font-size:12px;color:var(--text-dim);padding:8px 0}

/* MAIN */
.main{padding:24px;max-width:1200px;margin:0 auto}

/* STATS CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--sand-dark);border-radius:16px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-val{font-family:'DM Serif Display';font-size:36px;margin:8px 0 4px}
.stat-label{font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:4px}

/* TABLE */
.table-wrap{background:var(--white);border:1px solid var(--sand-dark);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.table-header{padding:16px 20px;border-bottom:1px solid var(--sand-dark);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.table-header h3{font-size:16px;font-weight:700}
.table-search{padding:8px 14px;border:1px solid var(--sand-dark);border-radius:8px;font-family:'DM Sans';font-size:13px;width:220px}
.table-search:focus{border-color:var(--gold);outline:none}
table{width:100%;border-collapse:collapse}
th{background:var(--cream);padding:10px 14px;font-size:12px;font-weight:700;text-align:left;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--sand-dark);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--charcoal)}
th .sort-icon{opacity:.3;margin-left:4px;font-size:10px}
th.sorted .sort-icon{opacity:1;color:var(--gold)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--sand-dark)}
tr:last-child td{border-bottom:none}
tr:hover{background:rgba(200,168,53,.04)}
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block}
.badge-green{background:rgba(39,134,74,.1);color:var(--green)}
.badge-gold{background:rgba(200,168,53,.12);color:var(--gold)}
.badge-red{background:rgba(192,57,43,.08);color:var(--red)}
.badge-blue{background:rgba(44,111,187,.1);color:var(--blue)}
.growth-positive{color:var(--green);font-weight:700}
.growth-negative{color:var(--red);font-weight:700}
.growth-zero{color:var(--text-dim)}

/* EMPTY STATE */
.empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty h3{color:var(--charcoal);margin-bottom:8px}
.empty p{color:var(--text-dim);font-size:14px;max-width:400px;margin:0 auto}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:8px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse .6s ease-in-out infinite alternate}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{to{opacity:.2;transform:scale(.7)}}

/* MOBILE */
@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .header{padding:16px}
  .main{padding:16px}
  .table-wrap{overflow-x:auto}
  table{min-width:700px}
  .ctrl-input{min-width:100%;width:100%}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">N</div>
  <div>
    <h1>DSPM Dashboard</h1>
    <p>N'Medov Sales Academy — Результаты тренингов</p>
  </div>
</div>

<div class="controls">
  <input type="text" class="ctrl-input" id="sheetUrl" placeholder="Вставьте ссылку на Google Sheets или Sheet ID" value="">
  <button class="ctrl-btn ctrl-btn-primary" onclick="loadData()">📊 Загрузить данные</button>
  <button class="ctrl-btn ctrl-btn-secondary" onclick="loadDemo()">👁️ Демо-данные</button>
  <div class="ctrl-status" id="status"></div>
</div>

<div class="main">
  <!-- STATS -->
  <div class="stats" id="statsCards">
    <div class="stat-card"><div class="stat-label">Участников</div><div class="stat-val" id="statTotal" style="color:var(--charcoal);">—</div></div>
    <div class="stat-card"><div class="stat-label">Средний PRE</div><div class="stat-val" id="statPre" style="color:var(--blue);">—</div><div class="stat-sub" id="statPreSub"></div></div>
    <div class="stat-card"><div class="stat-label">Средний POST</div><div class="stat-val" id="statPost" style="color:var(--green);">—</div><div class="stat-sub" id="statPostSub"></div></div>
    <div class="stat-card"><div class="stat-label">Средний рост</div><div class="stat-val" id="statGrowth" style="color:var(--gold);">—</div><div class="stat-sub" id="statGrowthSub"></div></div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <h3>📋 Результаты участников</h3>
      <input type="text" class="table-search" id="searchInput" placeholder="🔍 Поиск по имени..." oninput="filterTable()">
    </div>
    <div id="tableContent">
      <div class="empty">
        <div class="empty-icon">📊</div>
        <h3>Нет данных</h3>
        <p>Вставьте ссылку на Google Sheets с результатами тренинга или нажмите «Демо-данные» для просмотра</p>
      </div>
    </div>
  </div>
</div>

<script>
let allData = [];
let sortCol = -1;
let sortDir = 'asc';

// Extract sheet ID from URL or raw ID
function extractSheetId(input) {
  input = input.trim();
  const match = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1];
  if (/^[a-zA-Z0-9_-]{20,}$/.test(input)) return input;
  return null;
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? 'var(--red)' : 'var(--text-dim)';
}

async function loadData() {
  const input = document.getElementById('sheetUrl').value;
  const sheetId = extractSheetId(input);
  if (!sheetId) {
    setStatus('⚠️ Неверный формат. Вставьте ссылку на Google Sheets или ID таблицы.', true);
    return;
  }

  setStatus('⏳ Загрузка данных...');
  document.getElementById('tableContent').innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';

  try {
    // Fetch using Google Sheets public CSV export
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
    const res = await fetch(url);
    const text = await res.text();

    // Parse JSONP response
    const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));

    if (!json.table || !json.table.rows || json.table.rows.length === 0) {
      setStatus('⚠️ Таблица пуста или не удалось прочитать.', true);
      showEmpty();
      return;
    }

    const cols = json.table.cols.map(c => (c.label || '').toLowerCase().trim());
    const rows = json.table.rows;

    // Try to auto-detect columns
    const nameIdx = cols.findIndex(c => c.includes('имя') || c.includes('ism') || c.includes('name') || c.includes('ism'));
    const regionIdx = cols.findIndex(c => c.includes('регион') || c.includes('hudud') || c.includes('region'));
    const preIdx = cols.findIndex(c => c.includes('pre'));
    const postIdx = cols.findIndex(c => c.includes('post'));
    const dateIdx = cols.findIndex(c => c.includes('дата') || c.includes('sana') || c.includes('date'));

    allData = rows.map(r => {
      const v = r.c || [];
      return {
        name: (v[nameIdx >= 0 ? nameIdx : 0] || {}).v || '—',
        region: regionIdx >= 0 ? ((v[regionIdx] || {}).v || '—') : '—',
        pre: preIdx >= 0 ? (parseFloat((v[preIdx] || {}).v) || 0) : 0,
        post: postIdx >= 0 ? (parseFloat((v[postIdx] || {}).v) || 0) : 0,
        date: dateIdx >= 0 ? ((v[dateIdx] || {}).v || '—') : '—',
      };
    }).filter(d => d.name !== '—');

    setStatus(`✅ Загружено: ${allData.length} записей`);
    renderAll();
  } catch(e) {
    setStatus('❌ Ошибка загрузки. Убедитесь, что таблица доступна по ссылке (настройки доступа → «Все, у кого есть ссылка»).', true);
    showEmpty();
    console.error(e);
  }
}

function loadDemo() {
  const regions = ['Навои', 'Бухара', 'Джизак', 'Денов', 'Ташкент'];
  const names = [
    'Абдулла К.', 'Бахром Р.', 'Дильшод М.', 'Жасур Т.', 'Ислом Н.',
    'Камол А.', 'Лазиз С.', 'Мурод Х.', 'Нодир Б.', 'Отабек Ш.',
    'Рустам Г.', 'Сардор П.', 'Тимур В.', 'Улугбек Ю.', 'Фарход Э.',
    'Хуршид Д.', 'Шерзод Л.', 'Элмурод К.', 'Юсуф Р.', 'Азиз М.'
  ];
  allData = names.map(name => {
    const pre = Math.round(20 + Math.random() * 50);
    const growth = Math.round(5 + Math.random() * 35);
    return {
      name,
      region: regions[Math.floor(Math.random() * regions.length)],
      pre,
      post: Math.min(100, pre + growth),
      date: '2026-04-08'
    };
  });
  setStatus('📋 Демо-данные загружены (20 участников)');
  renderAll();
}

function renderAll() {
  renderStats();
  renderTable();
}

function renderStats() {
  const n = allData.length;
  const avgPre = n ? Math.round(allData.reduce((s,d) => s+d.pre, 0) / n) : 0;
  const avgPost = n ? Math.round(allData.reduce((s,d) => s+d.post, 0) / n) : 0;
  const avgGrowth = avgPost - avgPre;

  document.getElementById('statTotal').textContent = n;
  document.getElementById('statPre').textContent = avgPre + '%';
  document.getElementById('statPost').textContent = avgPost + '%';
  document.getElementById('statGrowth').textContent = (avgGrowth >= 0 ? '+' : '') + avgGrowth + '%';
  document.getElementById('statGrowth').style.color = avgGrowth > 0 ? 'var(--green)' : avgGrowth < 0 ? 'var(--red)' : 'var(--text-dim)';

  // Sub labels
  const above70pre = allData.filter(d => d.pre >= 70).length;
  const above70post = allData.filter(d => d.post >= 70).length;
  document.getElementById('statPreSub').textContent = `${above70pre} из ${n} ≥70%`;
  document.getElementById('statPostSub').textContent = `${above70post} из ${n} ≥70%`;
  document.getElementById('statGrowthSub').textContent = avgGrowth > 15 ? '🏆 Отлично' : avgGrowth > 5 ? '🚀 Хорошо' : avgGrowth >= 0 ? '📈 Нормально' : '⚠️ Снижение';
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let data = allData.filter(d => d.name.toLowerCase().includes(search) || d.region.toLowerCase().includes(search));

  if (sortCol >= 0) {
    const keys = ['name','region','pre','post','growth'];
    data.sort((a,b) => {
      let va, vb;
      if (keys[sortCol] === 'growth') {
        va = a.post - a.pre; vb = b.post - b.pre;
      } else {
        va = a[keys[sortCol]]; vb = b[keys[sortCol]];
      }
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  if (data.length === 0) {
    document.getElementById('tableContent').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h3>Не найдено</h3><p>Попробуйте другой поисковый запрос</p></div>';
    return;
  }

  const headers = ['Участник','Регион','PRE-Test','POST-Test','Рост'].map((h,i) =>
    `<th class="${sortCol===i?'sorted':''}" onclick="sortTable(${i})">${h} <span class="sort-icon">${sortCol===i?(sortDir==='asc'?'▲':'▼'):'▲'}</span></th>`
  ).join('');

  const rows = data.map(d => {
    const growth = d.post - d.pre;
    const preBadge = d.pre >= 70 ? 'badge-green' : d.pre >= 50 ? 'badge-gold' : 'badge-red';
    const postBadge = d.post >= 70 ? 'badge-green' : d.post >= 50 ? 'badge-gold' : 'badge-red';
    const growthClass = growth > 0 ? 'growth-positive' : growth < 0 ? 'growth-negative' : 'growth-zero';
    return `<tr>
      <td><strong>${d.name}</strong></td>
      <td><span class="badge badge-blue">${d.region}</span></td>
      <td><span class="badge ${preBadge}">${d.pre}%</span></td>
      <td><span class="badge ${postBadge}">${d.post}%</span></td>
      <td class="${growthClass}">${growth > 0 ? '+' : ''}${growth}%</td>
    </tr>`;
  }).join('');

  document.getElementById('tableContent').innerHTML = `
    <div style="overflow-x:auto;">
      <table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function sortTable(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  renderTable();
}

function filterTable() {
  renderTable();
}

function showEmpty() {
  document.getElementById('tableContent').innerHTML = '<div class="empty"><div class="empty-icon">📊</div><h3>Нет данных</h3><p>Вставьте ссылку на Google Sheets с результатами тренинга или нажмите «Демо-данные» для просмотра</p></div>';
}
</script>
</body>
</html>
