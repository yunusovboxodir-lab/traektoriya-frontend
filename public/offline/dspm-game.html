<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSPM O'yin — N'Medov Sales Academy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f97316' rx='20' width='100' height='100'/><text x='50%' y='58%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='60' font-weight='bold'>N</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Segoe UI', system-ui, sans-serif; }
.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.winner-pulse { animation: pulse 1s ease-in-out infinite; }
@keyframes confetti { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.confetti-piece { position: fixed; top: -10px; animation: confetti 3s ease-in forwards; pointer-events: none; z-index: 1000; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-slate-900 to-gray-900 text-white">
<div id="app" class="max-w-4xl mx-auto px-4 py-6"></div>

<script>
// ============================================
// DSPM GAME — Strategik o'yin
// 2 jamoa: DS (Distribution+Shelving) vs PM (Pricing+Merchandising)
// Trener ball kiritadi, natija Google Sheets ga saqlanadi
// ============================================

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVUS1sZ0B1LFT19dYBqF3JkCCaRZPk88dJZpyBXANkG2a-6U60pQ6V3OXm1xyxSkEK/exec";

const ROUNDS = [
  {
    id: 1,
    title: "1-raund: Bozorga kirish",
    subtitle: "Yangi mahsulot bilan bozorga kirish strategiyasi",
    description: "Ipak yo'lidan kelgan yangi mahsulot — hech kim bilmaydi, hech kim xohlamaydi. Qanday qilib bozorga kiritasiz?",
    ds_task: "DS jamoa: Distribution va Shelving orqali mahsulotni do'konlarga joylashtirish strategiyasini tuzing",
    pm_task: "PM jamoa: Pricing va Merchandising orqali xaridorlarni jalb qilish strategiyasini tuzing",
    max_score: 25
  },
  {
    id: 2,
    title: "2-raund: Raqobat",
    subtitle: "Raqobatchi yangi mahsulot bilan keldi",
    description: "Raqobatchi siz turgan do'konlarga o'z mahsulotini olib keldi. Sizning ulushingiz tushmoqda.",
    ds_task: "DS jamoa: Distribution kengaytirish va Shelving joyini himoya qilish rejasini tuzing",
    pm_task: "PM jamoa: Narx strategiyasi va POSM bilan raqobatdan ustun chiqish rejasini tuzing",
    max_score: 25
  },
  {
    id: 3,
    title: "3-raund: O'sish",
    subtitle: "Bozor ulushini 2 baravar oshirish",
    description: "Kompaniya maqsad qo'ydi: 3 oyda bozor ulushini 2 baravar oshirish. Qanday erishasiz?",
    ds_task: "DS jamoa: Yangi do'konlarga kirish va mavjud do'konlarda javon ulushini oshirish rejasi",
    pm_task: "PM jamoa: Aksiya, narx optimizatsiyasi va visual merchandising orqali sotishni oshirish",
    max_score: 25
  },
  {
    id: 4,
    title: "4-raund: DSPM Integratsiya",
    subtitle: "To'rtala komponent birgalikda",
    description: "Endi ikkala jamoa birgalikda: D+S+P+M tizimini yaxlit ishlatib, eng samarali strategiyani tuzing.",
    ds_task: "Birlashgan topshiriq: To'liq DSPM strategiyasini tuzing — har bir komponent qanday qo'llab-quvvatlaydi?",
    pm_task: "Birlashgan topshiriq: To'liq DSPM strategiyasini tuzing — har bir komponent qanday qo'llab-quvvatlaydi?",
    max_score: 25
  }
];

let state = {
  screen: 'setup', // setup, game, results
  teams: { ds: 'DS Jamoa', pm: 'PM Jamoa' },
  currentRound: 0,
  scores: { ds: [null, null, null, null], pm: [null, null, null, null] },
  gameDate: new Date().toISOString().split('T')[0],
  location: '',
  sending: false,
  sent: false
};

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'setup') renderSetup(app);
  else if (state.screen === 'game') renderGame(app);
  else if (state.screen === 'results') renderResults(app);
}

function renderSetup(app) {
  app.innerHTML = `
    <div class="fade-in">
      <div class="text-center mb-8 pt-4">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-orange-500 to-amber-500 rounded-2xl mb-4">
          <span class="text-white font-bold text-2xl">N</span>
        </div>
        <h1 class="text-2xl font-bold mb-1">DSPM Strategik O'yin</h1>
        <p class="text-gray-400 text-sm">DS vs PM — qaysi komponent hal qiluvchi?</p>
      </div>

      <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-6 border border-slate-700/50 space-y-4 mb-4">
        <h3 class="text-lg font-semibold">O'yin sozlamalari</h3>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">🔵 DS jamoa nomi</label>
            <input id="ds-name" type="text" value="${state.teams.ds}" placeholder="DS Jamoa"
              class="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">🟠 PM jamoa nomi</label>
            <input id="pm-name" type="text" value="${state.teams.pm}" placeholder="PM Jamoa"
              class="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white focus:border-orange-500 focus:outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Joylashuv / Shahar</label>
          <input id="location" type="text" placeholder="Masalan: Toshkent, Samarqand..."
            class="w-full bg-slate-700/50 border border-slate-600/50 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-orange-500 focus:outline-none"
            value="${state.location}">
        </div>
      </div>

      <!-- Game Rules -->
      <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-6 border border-slate-700/50 mb-4">
        <h3 class="text-lg font-semibold mb-3">Qoidalar</h3>
        <div class="space-y-3 text-gray-300 text-sm">
          <div class="flex gap-3">
            <span class="text-blue-400 font-bold shrink-0">🔵 DS</span>
            <span>Distribution + Shelving — mahsulotni do'konga olib kirish va joylash</span>
          </div>
          <div class="flex gap-3">
            <span class="text-orange-400 font-bold shrink-0">🟠 PM</span>
            <span>Pricing + Merchandising — narx va vizual bilan xaridorni jalb qilish</span>
          </div>
          <div class="border-t border-slate-700 pt-3">
            <p>4 raund • Har bir raund — yangi stsenariy</p>
            <p>Har bir javob uchun 0-25 ball</p>
            <p>4-raund: jamoalar birlashadi → DSPM tizim kuchi</p>
          </div>
        </div>
      </div>

      <button onclick="startGame()" class="w-full py-4 rounded-2xl font-semibold text-lg bg-gradient-to-r from-orange-500 to-amber-500 text-white hover:shadow-lg hover:shadow-orange-500/25 transition-all">
        O'yinni boshlash →
      </button>

      <div class="text-center mt-4">
        <a href="/" class="text-gray-500 text-sm hover:text-gray-300">← Bosh sahifa</a>
      </div>
    </div>
  `;
}

function startGame() {
  state.teams.ds = document.getElementById('ds-name').value.trim() || 'DS Jamoa';
  state.teams.pm = document.getElementById('pm-name').value.trim() || 'PM Jamoa';
  state.location = document.getElementById('location').value.trim();
  state.screen = 'game';
  state.currentRound = 0;
  window.scrollTo(0, 0);
  render();
}

function renderGame(app) {
  const round = ROUNDS[state.currentRound];
  const dsTotal = state.scores.ds.reduce((a, b) => a + (b || 0), 0);
  const pmTotal = state.scores.pm.reduce((a, b) => a + (b || 0), 0);

  app.innerHTML = `
    <div class="fade-in">
      <!-- Scoreboard -->
      <div class="grid grid-cols-3 gap-2 mb-6">
        <div class="bg-blue-500/10 border border-blue-500/30 rounded-2xl p-4 text-center">
          <p class="text-xs text-blue-400 mb-1">🔵 ${state.teams.ds}</p>
          <p class="text-3xl font-bold text-blue-400">${dsTotal}</p>
        </div>
        <div class="flex items-center justify-center">
          <div class="text-center">
            <p class="text-xs text-gray-500">Raund</p>
            <p class="text-2xl font-bold text-white">${state.currentRound + 1}/4</p>
          </div>
        </div>
        <div class="bg-orange-500/10 border border-orange-500/30 rounded-2xl p-4 text-center">
          <p class="text-xs text-orange-400 mb-1">🟠 ${state.teams.pm}</p>
          <p class="text-3xl font-bold text-orange-400">${pmTotal}</p>
        </div>
      </div>

      <!-- Round Card -->
      <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-6 border border-slate-700/50 mb-4">
        <h2 class="text-xl font-bold mb-1">${round.title}</h2>
        <p class="text-gray-400 text-sm mb-4">${round.subtitle}</p>
        
        <div class="bg-slate-700/30 rounded-2xl p-4 mb-4">
          <p class="text-gray-300 leading-relaxed">${round.description}</p>
        </div>

        <!-- Tasks -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div class="bg-blue-500/5 border border-blue-500/20 rounded-2xl p-4">
            <p class="text-xs text-blue-400 font-semibold mb-2">🔵 ${state.teams.ds} topshirig'i:</p>
            <p class="text-gray-300 text-sm">${round.ds_task}</p>
          </div>
          <div class="bg-orange-500/5 border border-orange-500/20 rounded-2xl p-4">
            <p class="text-xs text-orange-400 font-semibold mb-2">🟠 ${state.teams.pm} topshirig'i:</p>
            <p class="text-gray-300 text-sm">${round.pm_task}</p>
          </div>
        </div>

        <!-- Score Input -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-blue-400 mb-2 font-semibold">🔵 ${state.teams.ds} ball (0-${round.max_score})</label>
            <input id="ds-score" type="number" min="0" max="${round.max_score}" 
              value="${state.scores.ds[state.currentRound] !== null ? state.scores.ds[state.currentRound] : ''}"
              placeholder="0"
              class="w-full bg-slate-700/50 border border-blue-500/30 rounded-xl px-4 py-4 text-2xl text-center text-blue-400 font-bold focus:border-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-orange-400 mb-2 font-semibold">🟠 ${state.teams.pm} ball (0-${round.max_score})</label>
            <input id="pm-score" type="number" min="0" max="${round.max_score}"
              value="${state.scores.pm[state.currentRound] !== null ? state.scores.pm[state.currentRound] : ''}"
              placeholder="0"
              class="w-full bg-slate-700/50 border border-orange-500/30 rounded-xl px-4 py-4 text-2xl text-center text-orange-400 font-bold focus:border-orange-500 focus:outline-none">
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <div class="flex gap-3">
        ${state.currentRound > 0 ? `
          <button onclick="prevRound()" class="flex-1 py-3 rounded-xl border border-slate-600/50 text-gray-400 hover:text-white transition-all">← Oldingi</button>
        ` : `
          <button onclick="backToSetup()" class="flex-1 py-3 rounded-xl border border-slate-600/50 text-gray-400 hover:text-white transition-all">← Sozlamalar</button>
        `}
        ${state.currentRound < 3 ? `
          <button onclick="nextRound()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold hover:shadow-lg transition-all">
            Keyingi raund →
          </button>
        ` : `
          <button onclick="finishGame()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-green-500 to-emerald-500 text-white font-semibold hover:shadow-lg transition-all">
            ✓ O'yinni yakunlash
          </button>
        `}
      </div>

      <!-- Round dots -->
      <div class="flex justify-center gap-3 mt-4">
        ${ROUNDS.map((_, i) => {
          const active = i === state.currentRound;
          const done = state.scores.ds[i] !== null && state.scores.pm[i] !== null;
          return `<button onclick="goToRound(${i})" class="w-10 h-10 rounded-xl text-sm font-semibold transition-all ${active ? 'bg-orange-500 text-white' : done ? 'bg-slate-600 text-white' : 'bg-slate-700/50 text-gray-500 hover:bg-slate-700'}">${i+1}</button>`;
        }).join('')}
      </div>
    </div>
  `;
}

function saveCurrentScores() {
  const dsVal = document.getElementById('ds-score')?.value;
  const pmVal = document.getElementById('pm-score')?.value;
  const round = ROUNDS[state.currentRound];
  if (dsVal !== '' && dsVal !== undefined) state.scores.ds[state.currentRound] = Math.min(Math.max(parseInt(dsVal) || 0, 0), round.max_score);
  if (pmVal !== '' && pmVal !== undefined) state.scores.pm[state.currentRound] = Math.min(Math.max(parseInt(pmVal) || 0, 0), round.max_score);
}

function nextRound() {
  saveCurrentScores();
  if (state.currentRound < 3) { state.currentRound++; window.scrollTo(0, 0); render(); }
}

function prevRound() {
  saveCurrentScores();
  if (state.currentRound > 0) { state.currentRound--; window.scrollTo(0, 0); render(); }
}

function goToRound(i) {
  saveCurrentScores();
  state.currentRound = i; window.scrollTo(0, 0); render();
}

function backToSetup() {
  saveCurrentScores();
  state.screen = 'setup'; render();
}

function finishGame() {
  saveCurrentScores();
  // Fill missing scores with 0
  for (let i = 0; i < 4; i++) {
    if (state.scores.ds[i] === null) state.scores.ds[i] = 0;
    if (state.scores.pm[i] === null) state.scores.pm[i] = 0;
  }
  state.screen = 'results';
  window.scrollTo(0, 0);
  showConfetti();
  sendGameToGoogle();
  render();
}

function showConfetti() {
  const colors = ['#f97316', '#3b82f6', '#22c55e', '#eab308', '#ec4899'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.width = (Math.random() * 10 + 5) + 'px';
    el.style.height = (Math.random() * 10 + 5) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    el.style.animationDelay = Math.random() * 2 + 's';
    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

async function sendGameToGoogle() {
  if (state.sending || state.sent) return;
  state.sending = true;
  const dsTotal = state.scores.ds.reduce((a, b) => a + b, 0);
  const pmTotal = state.scores.pm.reduce((a, b) => a + b, 0);
  const payload = {
    type: 'game',
    gameType: 'DSPM',
    date: state.gameDate,
    location: state.location,
    teams: state.teams,
    rounds: ROUNDS.map((r, i) => ({
      round: r.id, title: r.title,
      ds_score: state.scores.ds[i], pm_score: state.scores.pm[i]
    })),
    totals: { ds: dsTotal, pm: pmTotal },
    winner: dsTotal > pmTotal ? 'DS' : pmTotal > dsTotal ? 'PM' : 'DRAW'
  };
  try {
    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    state.sent = true;
  } catch (e) { console.error(e); }
  state.sending = false;
  render();
}

function renderResults(app) {
  const dsTotal = state.scores.ds.reduce((a, b) => a + b, 0);
  const pmTotal = state.scores.pm.reduce((a, b) => a + b, 0);
  const maxPossible = ROUNDS.reduce((a, r) => a + r.max_score, 0);
  const winner = dsTotal > pmTotal ? 'ds' : pmTotal > dsTotal ? 'pm' : 'draw';

  app.innerHTML = `
    <div class="fade-in">
      <div class="text-center mb-6 pt-4">
        <h1 class="text-3xl font-bold mb-2">O'yin natijalari</h1>
        ${state.location ? `<p class="text-gray-500 text-sm">${state.location} • ${state.gameDate}</p>` : ''}
      </div>

      <!-- Winner Banner -->
      <div class="bg-gradient-to-r ${winner === 'ds' ? 'from-blue-500/20 to-blue-500/5 border-blue-500/30' : winner === 'pm' ? 'from-orange-500/20 to-orange-500/5 border-orange-500/30' : 'from-slate-500/20 to-slate-500/5 border-slate-500/30'} border rounded-3xl p-6 text-center mb-6 ${winner !== 'draw' ? 'winner-pulse' : ''}">
        <p class="text-sm text-gray-400 mb-1">${winner !== 'draw' ? "G'olib" : "Durrang!"}</p>
        <p class="text-3xl font-bold ${winner === 'ds' ? 'text-blue-400' : winner === 'pm' ? 'text-orange-400' : 'text-white'}">
          ${winner === 'ds' ? '🔵 ' + state.teams.ds : winner === 'pm' ? '🟠 ' + state.teams.pm : '🤝 Durrang'}
        </p>
        ${winner !== 'draw' ? `<p class="text-gray-400 text-sm mt-1">${Math.abs(dsTotal - pmTotal)} ball farq bilan</p>` : ''}
      </div>

      <!-- Score Comparison -->
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-blue-500/10 border border-blue-500/30 rounded-2xl p-4 text-center">
          <p class="text-xs text-blue-400 mb-1">🔵 ${state.teams.ds}</p>
          <p class="text-4xl font-bold text-blue-400">${dsTotal}</p>
          <p class="text-xs text-gray-500 mt-1">${maxPossible} dan</p>
        </div>
        <div class="flex items-center justify-center text-gray-600 text-2xl font-bold">VS</div>
        <div class="bg-orange-500/10 border border-orange-500/30 rounded-2xl p-4 text-center">
          <p class="text-xs text-orange-400 mb-1">🟠 ${state.teams.pm}</p>
          <p class="text-4xl font-bold text-orange-400">${pmTotal}</p>
          <p class="text-xs text-gray-500 mt-1">${maxPossible} dan</p>
        </div>
      </div>

      <!-- Round Details -->
      <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-6 border border-slate-700/50 mb-6">
        <h3 class="text-sm font-semibold text-gray-400 mb-4">Raundlar bo'yicha</h3>
        <div class="space-y-3">
          ${ROUNDS.map((r, i) => {
            const ds = state.scores.ds[i];
            const pm = state.scores.pm[i];
            const roundWin = ds > pm ? 'ds' : pm > ds ? 'pm' : 'draw';
            return `
              <div class="flex items-center gap-3">
                <span class="text-xs text-gray-500 w-20 shrink-0">Raund ${i+1}</span>
                <div class="flex-1 flex items-center gap-2">
                  <span class="text-sm font-semibold ${roundWin === 'ds' ? 'text-blue-400' : 'text-gray-400'} w-8 text-right">${ds}</span>
                  <div class="flex-1 h-3 bg-slate-700/50 rounded-full overflow-hidden flex">
                    <div class="bg-blue-500 h-full transition-all" style="width:${r.max_score > 0 ? (ds / r.max_score * 100) : 0}%"></div>
                  </div>
                  <div class="flex-1 h-3 bg-slate-700/50 rounded-full overflow-hidden flex justify-end">
                    <div class="bg-orange-500 h-full transition-all" style="width:${r.max_score > 0 ? (pm / r.max_score * 100) : 0}%"></div>
                  </div>
                  <span class="text-sm font-semibold ${roundWin === 'pm' ? 'text-orange-400' : 'text-gray-400'} w-8">${pm}</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- Key Insight -->
      <div class="bg-gradient-to-r from-amber-500/10 to-orange-500/10 border border-amber-500/30 rounded-3xl p-6 mb-6">
        <h3 class="text-lg font-bold text-amber-400 mb-2">💡 Asosiy xulosa</h3>
        <p class="text-gray-300 leading-relaxed">
          DSPM tizimi yaxlit ishlaydi. Na faqat Distribution+Shelving, na faqat Pricing+Merchandising yetarli emas.
          <strong class="text-white">Haqiqiy kuch — to'rtala komponentning birgalikdagi ishlashida.</strong>
          Xuddi shunday, har bir savdo vakili barcha 4 komponentni o'z ishida qo'llashi kerak.
        </p>
      </div>

      <div class="text-center text-sm ${state.sent ? 'text-green-400' : state.sending ? 'text-amber-400' : 'text-gray-500'} mb-4">
        ${state.sent ? '✓ Natijalar bazaga saqlandi' : state.sending ? '⏳ Saqlanmoqda...' : ''}
      </div>

      <div class="flex gap-3">
        <a href="/" class="flex-1 py-3 rounded-xl border border-slate-600/50 text-gray-400 text-center hover:text-white transition-all">← Bosh sahifa</a>
        <button onclick="newGame()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold hover:shadow-lg transition-all">Yangi o'yin</button>
      </div>
    </div>
  `;
}

function newGame() {
  state = {
    screen: 'setup', teams: { ds: 'DS Jamoa', pm: 'PM Jamoa' },
    currentRound: 0, scores: { ds: [null, null, null, null], pm: [null, null, null, null] },
    gameDate: new Date().toISOString().split('T')[0], location: '', sending: false, sent: false
  };
  render();
}

render();
</script>
</body>
</html>
