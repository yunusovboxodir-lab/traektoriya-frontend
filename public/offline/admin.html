<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — N'Medov Sales Academy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f97316' rx='20' width='100' height='100'/><text x='50%' y='58%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='60' font-weight='bold'>N</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: 'Segoe UI', system-ui, sans-serif; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.tab-active { border-color: #f97316 !important; color: #f97316 !important; background: rgba(249,115,22,0.1) !important; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-slate-900 to-gray-900 text-white">
<div id="app" class="max-w-6xl mx-auto px-4 py-6"></div>

<script>
// ============================================
// UNIFIED ADMIN PANEL
// DSPM + 7 Qadam results + Games
// Thursday auto-archiving via Apps Script
// ============================================

const DSPM_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVUS1sZ0B1LFT19dYBqF3JkCCaRZPk88dJZpyBXANkG2a-6U60pQ6V3OXm1xyxSkEK/exec";
const QADAM_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdd8y-oYSfOVl-69YQ93hxlEH9QMF4mxb2Z1tNB4GeruHvIt_4kGTZ4PytXn_9OeFb1w/exec";

let state = {
  tab: 'dspm', // dspm, qadam, games
  dspmData: [],
  qadamData: [],
  dspmLoading: false,
  qadamLoading: false,
  filter: 'all', // all, or region name
  selectedResult: null,
  archiveStatus: null
};

// JSONP loader
function loadJSONP(url, callback, errorCb) {
  const cbName = 'cb_' + Math.random().toString(36).substr(2, 9);
  const timeout = setTimeout(() => {
    delete window[cbName];
    if (errorCb) errorCb('Timeout');
  }, 15000);
  
  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    callback(data);
  };
  
  const script = document.createElement('script');
  script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
  script.onerror = () => { clearTimeout(timeout); delete window[cbName]; if (errorCb) errorCb('Network error'); };
  document.body.appendChild(script);
  setTimeout(() => { try { document.body.removeChild(script); } catch(e){} }, 16000);
}

function loadData() {
  state.dspmLoading = true;
  state.qadamLoading = true;
  render();

  loadJSONP(DSPM_SCRIPT_URL + '?action=getResults', (data) => {
    state.dspmData = Array.isArray(data) ? data : (data && data.results ? data.results : []);
    state.dspmLoading = false;
    render();
  }, () => { state.dspmLoading = false; render(); });

  loadJSONP(QADAM_SCRIPT_URL + '?action=getResults', (data) => {
    state.qadamData = Array.isArray(data) ? data : (data && data.results ? data.results : []);
    state.qadamLoading = false;
    render();
  }, () => { state.qadamLoading = false; render(); });
}

function triggerArchive(scriptUrl) {
  state.archiveStatus = 'archiving';
  render();
  loadJSONP(scriptUrl + '?action=archive', (data) => {
    state.archiveStatus = 'done';
    render();
    setTimeout(() => { state.archiveStatus = null; loadData(); }, 2000);
  }, () => {
    state.archiveStatus = 'error';
    render();
  });
}

function getFiltered(data) {
  if (state.filter === 'all') return data;
  return data.filter(r => r.region === state.filter);
}

function getRegions(data) {
  const regions = new Set();
  data.forEach(r => { if (r.region) regions.add(r.region); });
  return Array.from(regions).sort();
}

function calcStats(data) {
  if (data.length === 0) return { avg: 0, min: 0, max: 0, count: 0 };
  const pcts = data.map(r => r.percentage || 0);
  return {
    count: data.length,
    avg: Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length),
    min: Math.min(...pcts),
    max: Math.max(...pcts)
  };
}

function exportCSV(data, prefix) {
  if (data.length === 0) return;
  const headers = ['Sana', 'Ism', 'Lavozim', 'Diler', 'Hudud', 'Turi', 'Umumiy %', 'Ball'];
  const rows = data.map(r => [
    r.timestamp || '', r.name || '', r.position || '', r.dealer || '',
    r.region || '', r.testType || '', (r.percentage || 0) + '%',
    (r.totalScore || 0) + '/' + (r.maxScore || 0)
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${c}"`).join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${prefix}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function getLevelColor(pct) {
  if (pct >= 85) return 'text-green-400';
  if (pct >= 70) return 'text-blue-400';
  if (pct >= 50) return 'text-amber-400';
  return 'text-red-400';
}

function getLevelBg(pct) {
  if (pct >= 85) return 'bg-green-500';
  if (pct >= 70) return 'bg-blue-500';
  if (pct >= 50) return 'bg-amber-500';
  return 'bg-red-500';
}

function render() {
  const app = document.getElementById('app');
  const currentData = state.tab === 'dspm' ? state.dspmData : state.qadamData;
  const filtered = getFiltered(currentData.filter(r => !r.type || r.type !== 'game'));
  const games = currentData.filter(r => r.type === 'game');
  const regions = getRegions(currentData);
  const stats = calcStats(filtered);
  const loading = state.tab === 'dspm' ? state.dspmLoading : state.qadamLoading;

  app.innerHTML = `
    <div class="fade-in">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-r from-orange-500 to-amber-500 rounded-xl flex items-center justify-center">
            <span class="text-white font-bold">N</span>
          </div>
          <div>
            <h1 class="text-xl font-bold">Admin Panel</h1>
            <p class="text-gray-500 text-xs">N'Medov Sales Academy</p>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="loadData()" class="px-3 py-2 bg-slate-700/50 border border-slate-600/50 rounded-xl text-sm hover:bg-slate-700 transition-all" title="Yangilash">
            🔄 Yangilash
          </button>
          <a href="/" class="px-3 py-2 bg-slate-700/50 border border-slate-600/50 rounded-xl text-sm hover:bg-slate-700 transition-all text-gray-400">
            ← Bosh sahifa
          </a>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex gap-2 mb-6">
        <button onclick="switchTab('dspm')" class="flex-1 py-3 rounded-xl border text-sm font-semibold transition-all ${state.tab === 'dspm' ? 'tab-active border-orange-500' : 'border-slate-600/50 text-gray-400 hover:border-slate-500'}">
          📦 DSPM (${state.dspmData.filter(r=>!r.type||r.type!=='game').length})
        </button>
        <button onclick="switchTab('qadam')" class="flex-1 py-3 rounded-xl border text-sm font-semibold transition-all ${state.tab === 'qadam' ? 'tab-active border-orange-500' : 'border-slate-600/50 text-gray-400 hover:border-slate-500'}">
          🚶 7 Qadam (${state.qadamData.filter(r=>!r.type||r.type!=='game').length})
        </button>
      </div>

      ${loading ? `
        <div class="text-center py-12">
          <div class="text-4xl mb-3">⏳</div>
          <p class="text-gray-400">Ma'lumotlar yuklanmoqda...</p>
        </div>
      ` : `
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-3 mb-6">
          <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4 text-center">
            <p class="text-2xl font-bold text-white">${stats.count}</p>
            <p class="text-xs text-gray-500">Jami testlar</p>
          </div>
          <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4 text-center">
            <p class="text-2xl font-bold ${getLevelColor(stats.avg)}">${stats.avg}%</p>
            <p class="text-xs text-gray-500">O'rtacha</p>
          </div>
          <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4 text-center">
            <p class="text-2xl font-bold text-green-400">${stats.max}%</p>
            <p class="text-xs text-gray-500">Eng yuqori</p>
          </div>
          <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4 text-center">
            <p class="text-2xl font-bold text-red-400">${stats.min}%</p>
            <p class="text-xs text-gray-500">Eng past</p>
          </div>
        </div>

        <!-- Filters & Actions -->
        <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
          <div class="flex gap-2 flex-wrap">
            <button onclick="setFilter('all')" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${state.filter === 'all' ? 'bg-orange-500 text-white' : 'bg-slate-700/50 text-gray-400 hover:bg-slate-700'}">Hammasi</button>
            ${regions.map(r => `
              <button onclick="setFilter('${r}')" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${state.filter === r ? 'bg-orange-500 text-white' : 'bg-slate-700/50 text-gray-400 hover:bg-slate-700'}">${r}</button>
            `).join('')}
          </div>
          <div class="flex gap-2">
            <button onclick="exportCSV(getFiltered(state.${state.tab === 'dspm' ? 'dspmData' : 'qadamData'}.filter(r=>!r.type||r.type!=='game')), '${state.tab}')" class="px-3 py-1.5 bg-emerald-600/20 text-emerald-400 border border-emerald-600/30 rounded-lg text-xs font-semibold hover:bg-emerald-600/30 transition-all">
              📥 CSV
            </button>
            <button onclick="triggerArchive('${state.tab === 'dspm' ? DSPM_SCRIPT_URL : QADAM_SCRIPT_URL}')" class="px-3 py-1.5 bg-purple-600/20 text-purple-400 border border-purple-600/30 rounded-lg text-xs font-semibold hover:bg-purple-600/30 transition-all" title="Arxivlash (natijalarni 'Arxiv' varaqqa ko'chirish)">
              📁 Arxivlash
            </button>
          </div>
        </div>

        ${state.archiveStatus ? `
          <div class="mb-4 p-3 rounded-xl text-sm text-center ${state.archiveStatus === 'archiving' ? 'bg-amber-500/10 text-amber-400' : state.archiveStatus === 'done' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}">
            ${state.archiveStatus === 'archiving' ? '⏳ Arxivlanmoqda...' : state.archiveStatus === 'done' ? '✓ Arxivlandi! Ma\'lumotlar yangilanmoqda...' : '✗ Xatolik. Qayta urinib ko\'ring.'}
          </div>
        ` : ''}

        <!-- Results Table -->
        ${filtered.length === 0 ? `
          <div class="text-center py-12 bg-slate-800/30 rounded-2xl">
            <p class="text-gray-500">Hali natijalar yo'q</p>
          </div>
        ` : `
          <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-slate-700/30">
                    <th class="px-4 py-3 text-left text-xs text-gray-400 font-semibold">#</th>
                    <th class="px-4 py-3 text-left text-xs text-gray-400 font-semibold">Ism</th>
                    <th class="px-4 py-3 text-left text-xs text-gray-400 font-semibold">Lavozim</th>
                    <th class="px-4 py-3 text-left text-xs text-gray-400 font-semibold">Diler</th>
                    <th class="px-4 py-3 text-left text-xs text-gray-400 font-semibold">Hudud</th>
                    <th class="px-4 py-3 text-center text-xs text-gray-400 font-semibold">Natija</th>
                    <th class="px-4 py-3 text-left text-xs text-gray-400 font-semibold">Sana</th>
                  </tr>
                </thead>
                <tbody>
                  ${filtered.map((r, i) => {
                    const pct = r.percentage || 0;
                    return `
                      <tr class="border-t border-slate-700/30 hover:bg-slate-700/20 cursor-pointer transition-all" onclick="showDetail(${i})">
                        <td class="px-4 py-3 text-gray-500">${i + 1}</td>
                        <td class="px-4 py-3 font-semibold text-white">${r.name || '-'}</td>
                        <td class="px-4 py-3 text-gray-400">${r.position || '-'}</td>
                        <td class="px-4 py-3 text-gray-400">${r.dealer || '-'}</td>
                        <td class="px-4 py-3 text-gray-400">${r.region || '-'}</td>
                        <td class="px-4 py-3 text-center">
                          <span class="inline-block px-2 py-1 rounded-lg text-xs font-bold ${getLevelBg(pct)} text-white">${pct}%</span>
                        </td>
                        <td class="px-4 py-3 text-gray-500 text-xs">${r.timestamp || '-'}</td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `}

        <!-- Archive Info -->
        <div class="mt-6 p-4 bg-slate-800/30 border border-slate-700/30 rounded-2xl">
          <p class="text-gray-500 text-xs">
            💡 <strong class="text-gray-400">Arxivlash:</strong> Har payshanba kuni natijalar avtomatik "Arxiv" varaqqa ko'chiriladi va asosiy varaq tozalanadi. 
            Qo'lda arxivlash uchun yuqoridagi "📁 Arxivlash" tugmasini bosing.
          </p>
        </div>
      `}
    </div>

    <!-- Detail Modal -->
    ${state.selectedResult !== null ? renderModal(filtered[state.selectedResult]) : ''}
  `;
}

function renderModal(r) {
  if (!r) return '';
  const pct = r.percentage || 0;
  const cats = r.categories || {};
  
  const catNames = state.tab === 'dspm' 
    ? { distribution: '📦 Distribution', shelving: '🏪 Shelving', pricing: '💰 Pricing', merchandising: '🎨 Merchandising', system: '⚙️ DSPM Tizim' }
    : { reja: '📋 Rejalashtirish', ochish: '🤝 Ochish', kozdan: "👀 Ko'zdan kechirish", fup: '🎯 FUP', merchandayzing: '🏪 Merchandayzing', yopish: '✅ Yopish', tahlil: '📊 Tahlil' };

  return `
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="closeModal(event)">
      <div class="bg-slate-800 border border-slate-700 rounded-3xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="text-lg font-bold">${r.name || '-'}</h3>
            <p class="text-gray-400 text-sm">${r.position || ''} ${r.dealer ? '• ' + r.dealer : ''}</p>
            <p class="text-gray-500 text-xs">${r.region || ''} • ${r.timestamp || ''}</p>
          </div>
          <button onclick="state.selectedResult=null;render();" class="text-gray-500 hover:text-white text-xl">&times;</button>
        </div>
        
        <div class="text-center mb-4">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full ${getLevelBg(pct)} mb-2">
            <span class="text-2xl font-bold text-white">${pct}%</span>
          </div>
          <p class="text-gray-400 text-sm">${r.totalScore || 0}/${r.maxScore || 0} ball</p>
        </div>

        <div class="space-y-3">
          ${Object.entries(catNames).map(([key, name]) => {
            const val = cats[key] || 0;
            return `
              <div>
                <div class="flex justify-between items-center mb-1">
                  <span class="text-xs">${name}</span>
                  <span class="text-xs font-semibold ${getLevelColor(val)}">${val}%</span>
                </div>
                <div class="w-full bg-slate-700/50 rounded-full h-2">
                  <div class="${getLevelBg(val)} h-2 rounded-full transition-all" style="width:${val}%"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function switchTab(tab) { state.tab = tab; state.filter = 'all'; state.selectedResult = null; render(); }
function setFilter(f) { state.filter = f; state.selectedResult = null; render(); }
function showDetail(i) { state.selectedResult = i; render(); }
function closeModal(e) { if (e.target === e.currentTarget) { state.selectedResult = null; render(); } }

// Init
loadData();
render();
</script>
</body>
</html>
