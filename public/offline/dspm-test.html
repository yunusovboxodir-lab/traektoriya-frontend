const REGIONS=[

  {v:'samarkand',uz:"Samarqand",ru:"Самарканд"},{v:'bukhara',uz:"Buxoro",ru:"Бухара"},
  {v:'navoi',uz:"Navoiy",ru:"Навои"},{v:'jizzakh',uz:"Jizzax",ru:"Джизак"},

  {v:'karakalpak',uz:"Qoraqalpog'iston",ru:"Каракалпакстан"},{v:'sirdaryo',uz:"Sirdaryo",ru:"Сырдарья"},
];

const CC={distribution:'bg-teal text-white',shelving:'bg-gold text-charcoal',pricing:'bg-nblue text-white',merchandising:'bg-norange text-white',system:'bg-nred text-white'};
const CB={distribution:'border-teal',shelving:'border-gold',pricing:'border-nblue',merchandising:'border-norange',system:'border-nred'};
const CL={distribution:'Distribution',shelving:'Shelving',pricing:'Pricing',merchandising:'Merchandising',system:'DSPM System'};

function App(){
  const[lang,setLang]=useState('uz');
  const[sec,setSec]=useState(0);
  const[ans,setAns]=useState({});
  const[form,setForm]=useState({name:'',position:'',region:'',dealer:''});
  const[tt,setTT]=useState('');
  const[done,setDone]=useState(false);
  const[sending,setSending]=useState(false);

  const t=T[lang], qs=lang==='ru'?Q_RU:Q_UZ;
  const prog=()=>Object.keys(ans).length;

  const calc=()=>{
    const c={distribution:{n:"Distribution",s:[],m:12},shelving:{n:"Shelving",s:[],m:12},pricing:{n:"Pricing",s:[],m:12},merchandising:{n:"Merchandising",s:[],m:12},system:{n:"DSPM System",s:[],m:12}};
    qs.forEach(q=>{if(ans[q.id])c[q.cat].s.push(ans[q.id].s);});
    return Object.entries(c).map(([k,v])=>{const tot=v.s.reduce((a,b)=>a+b,0);const p=Math.round(tot/v.m*100);return{k,...v,tot,p,lvl:p>=75?t.lvlH:p>=50?t.lvlM:t.lvlL};});
  };

  const send=async()=>{
    setSending(true);
    const r=calc(),ts=r.reduce((a,b)=>a+b.tot,0);
    const data={name:form.name,position:form.position,dealer:form.dealer,region:form.region,testType:tt,totalScore:ts,maxScore:60,percentage:Math.round(ts/60*100),categories:Object.fromEntries(r.map(x=>[x.k,x.p])),catDetails:r.map(x=>({name:x.n,score:x.tot,max:x.m,pct:x.p,level:x.lvl})),answers:Object.entries(ans).map(([q,a])=>({q,answer:a.id,score:a.s})),lang};
    if(GOOGLE_SCRIPT_URL&&GOOGLE_SCRIPT_URL!=="YOUR_GOOGLE_SCRIPT_URL_HERE"){
      try{await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});}catch(e){console.error(e);}
    }
    setDone(true);setSending(false);window.scrollTo({top:0,behavior:'smooth'});
  };

  const LangBtn=()=>(
    <div className="inline-flex bg-charcoal/10 rounded-lg overflow-hidden border border-sand-dark">
      {['uz','ru'].map(l=>(
        <button key={l} onClick={()=>setLang(l)} className={`px-3 py-1.5 text-xs font-bold tracking-wider transition-all ${lang===l?'bg-gold text-charcoal':'text-charcoal/40 hover:text-charcoal/60'}`}>{l.toUpperCase()}</button>
      ))}
    </div>
  );

  // RESULTS
  if(done){
    const r=calc(),ts=r.reduce((a,b)=>a+b.tot,0),tp=Math.round(ts/60*100);
    let em='🔄',msg=t.msg0;
    if(tp>=85){em='🏆';msg=t.msg85;}else if(tp>=70){em='👍';msg=t.msg70;}else if(tp>=50){em='📚';msg=t.msg50;}
    return(
      <div className="min-h-screen bg-sand">
        <div className="max-w-2xl mx-auto px-4 py-8">
          <div className="flex justify-end mb-4"><LangBtn/></div>
          <div className="text-center mb-8">
            <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-sand-dark mb-4">
              <span className="text-sm font-semibold text-charcoal">{tt==='oldin'?t.beforeLabel:t.afterLabel}</span>
            </div>
            <div className="text-6xl mb-4">{em}</div>
            <div className="font-serif text-5xl text-charcoal">{tp}%</div>
            <p className="text-charcoal-light mt-2">{ts} / 60 {t.ball}</p>
            <p className="text-charcoal font-bold mt-3 text-lg">{msg}</p>
          </div>
          <div className="bg-white rounded-2xl p-6 border border-sand-dark shadow-sm">
            <h2 className="text-lg font-bold text-charcoal mb-4">{t.resultTitle}</h2>
            <div className="space-y-4">
              {r.map(c=>(
                <div key={c.k} className="bg-cream rounded-xl p-4">
                  <div className="flex justify-between items-center mb-2">
                    <div><p className="text-charcoal font-semibold">{c.n}</p><p className="text-charcoal-light text-sm">{c.tot}/12 {t.ball}</p></div>
                    <div className="text-right"><p className={`text-lg font-bold ${c.p>=75?'text-ngreen':c.p>=50?'text-gold':'text-nred'}`}>{c.p}%</p><p className="text-charcoal-light text-xs">{c.lvl}</p></div>
                  </div>
                  <div className="w-full bg-sand-dark rounded-full h-2.5">
                    <div className={`h-2.5 rounded-full transition-all duration-700 ${c.p>=75?'bg-ngreen':c.p>=50?'bg-gold':'bg-nred'}`} style={{width:`${c.p}%`}}></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          {GOOGLE_SCRIPT_URL!=="YOUR_GOOGLE_SCRIPT_URL_HERE"&&<p className="text-center text-ngreen text-sm mt-6 font-semibold">{t.saved}</p>}
          <button onClick={()=>{setDone(false);setAns({});setSec(0);setTT('');}} className="w-full mt-6 py-4 rounded-2xl font-bold bg-charcoal text-sand hover:bg-charcoal-light transition-all">{t.restart}</button>
        </div>
      </div>
    );
  }

  // FORM + TEST
  return(
    <div className="min-h-screen bg-sand">
      <div className="bg-charcoal">
        <div className="max-w-2xl mx-auto px-4 pt-5 pb-4">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-gold to-nred rounded-xl flex items-center justify-center"><span className="text-white font-black text-sm">N</span></div>
              <div><h1 className="text-lg font-bold text-sand">{t.title}</h1><p className="text-sand/50 text-xs">{t.subtitle}</p></div>
            </div>
            <div className="inline-flex bg-sand/10 rounded-lg overflow-hidden">
              {['uz','ru'].map(l=>(<button key={l} onClick={()=>setLang(l)} className={`px-3 py-1.5 text-xs font-bold tracking-wider transition-all ${lang===l?'bg-gold text-charcoal':'text-sand/50'}`}>{l.toUpperCase()}</button>))}
            </div>
          </div>
          {sec===1&&(<div className="mt-3"><div className="flex justify-between text-xs text-sand/50 mb-1"><span>{t.progress}</span><span>{prog()} / 15</span></div><div className="w-full bg-sand/10 rounded-full h-2"><div className="bg-gradient-to-r from-gold to-nred h-2 rounded-full transition-all" style={{width:`${prog()/15*100}%`}}></div></div></div>)}
        </div>
      </div>

      <div className="max-w-2xl mx-auto px-4 py-6 pb-16">
        {sec===0&&(
          <div className="space-y-5">
            <div className="bg-white rounded-2xl p-5 border border-sand-dark shadow-sm">
              <div className="flex items-center gap-3 mb-5"><span className="px-3 py-1 bg-teal rounded-full text-white text-xs font-bold">01</span><h2 className="text-lg font-bold text-charcoal">{t.personal}</h2></div>
              <p className="text-charcoal-light mb-5 text-sm">{t.testDesc}</p>
              <div className="space-y-4">
                <div><label className="block text-charcoal-light text-sm font-medium mb-1.5">{t.nameLabel}</label><input type="text" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={t.namePh} className="w-full bg-cream border-2 border-sand-dark rounded-xl px-4 py-3 text-charcoal placeholder-warm focus:outline-none focus:border-gold transition-colors"/></div>
                <div><label className="block text-charcoal-light text-sm font-medium mb-1.5">{t.posLabel}</label><input type="text" value={form.position} onChange={e=>setForm({...form,position:e.target.value})} placeholder={t.posPh} className="w-full bg-cream border-2 border-sand-dark rounded-xl px-4 py-3 text-charcoal placeholder-warm focus:outline-none focus:border-gold transition-colors"/></div>
                <div><label className="block text-charcoal-light text-sm font-medium mb-1.5">{t.dealerLabel}</label><input type="text" value={form.dealer} onChange={e=>setForm({...form,dealer:e.target.value})} placeholder={t.dealerPh} className="w-full bg-cream border-2 border-sand-dark rounded-xl px-4 py-3 text-charcoal placeholder-warm focus:outline-none focus:border-gold transition-colors"/></div>
                <div><label className="block text-charcoal-light text-sm font-medium mb-2">{t.regionLabel}</label>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    {REGIONS.map(r=>(<button key={r.v} onClick={()=>setForm({...form,region:r.v})} className={`p-2.5 rounded-xl border-2 transition-all text-center text-sm ${form.region===r.v?'bg-gold/15 border-gold text-charcoal font-semibold':'bg-cream border-sand-dark text-charcoal-light hover:border-warm'}`}>{lang==='ru'?r.ru:r.uz}</button>))}
                  </div>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-2xl p-5 border border-sand-dark shadow-sm">
              <div className="flex items-center gap-3 mb-4"><span className="px-3 py-1 bg-gold rounded-full text-charcoal text-xs font-bold">02</span><h2 className="text-lg font-bold text-charcoal">{t.typeTitle}</h2></div>
              <p className="text-charcoal-light mb-4 text-sm">{t.typeDesc}</p>
              <div className="grid grid-cols-2 gap-4">
                <button onClick={()=>setTT('oldin')} className={`p-5 rounded-2xl border-2 transition-all text-center ${tt==='oldin'?'bg-nblue/10 border-nblue':'bg-cream border-sand-dark hover:border-warm'}`}><span className="text-3xl block mb-2">📋</span><span className="block font-bold text-lg text-charcoal">{t.before}</span><span className="text-xs text-charcoal-light">{t.beforeSub}</span></button>
                <button onClick={()=>setTT('keyin')} className={`p-5 rounded-2xl border-2 transition-all text-center ${tt==='keyin'?'bg-ngreen/10 border-ngreen':'bg-cream border-sand-dark hover:border-warm'}`}><span className="text-3xl block mb-2">✅</span><span className="block font-bold text-lg text-charcoal">{t.after}</span><span className="text-xs text-charcoal-light">{t.afterSub}</span></button>
              </div>
            </div>
            <button onClick={()=>{setSec(1);window.scrollTo({top:0,behavior:'smooth'});}} disabled={!form.name||!tt} className={`w-full py-4 rounded-2xl font-bold text-lg transition-all ${form.name&&tt?'bg-gold text-charcoal hover:bg-gold-light shadow-lg shadow-gold/20':'bg-sand-dark text-warm cursor-not-allowed'}`}>{t.start}</button>
          </div>
        )}

        {sec===1&&(
          <div className="space-y-5">
            {qs.map((q,i)=>(
              <div key={q.id} className={`bg-white rounded-2xl p-5 border border-sand-dark shadow-sm ${ans[q.id]?'border-l-4 '+CB[q.cat]:''}`}>
                <div className="flex items-center gap-3 mb-3">
                  <span className={`px-3 py-1 rounded-full text-xs font-bold ${CC[q.cat]}`}>{String(i+1).padStart(2,'0')}</span>
                  <div><p className="text-charcoal font-semibold text-sm">{CL[q.cat]}</p>{q.type==='situation'&&<p className="text-norange text-xs font-medium">📌 {t.situation}: {q.bn}</p>}</div>
                </div>
                <div className="bg-cream rounded-xl p-4 mb-3">
                  <p className="text-charcoal font-medium text-sm leading-relaxed">{q.q}</p>
                  {q.h&&<p className="text-charcoal-light/50 text-xs mt-1">{q.h}</p>}
                </div>
                <div className="space-y-2">
                  {q.o.map(o=>(<button key={o.id} onClick={()=>setAns(p=>({...p,[q.id]:{id:o.id,s:o.s}}))} className={`w-full p-3.5 rounded-xl border-2 text-left transition-all text-sm ${ans[q.id]?.id===o.id?'bg-gold/15 border-gold text-charcoal font-semibold':'bg-cream border-sand-dark text-charcoal-light hover:border-warm'}`}><span className="font-bold mr-2 text-charcoal-light">{o.id.toUpperCase()})</span>{o.t}</button>))}
                </div>
              </div>
            ))}
            <button onClick={send} disabled={prog()<15||sending} className={`w-full py-4 rounded-2xl font-bold text-lg transition-all ${prog()>=15&&!sending?'bg-gold text-charcoal hover:bg-gold-light shadow-lg shadow-gold/20':'bg-sand-dark text-warm cursor-not-allowed'}`}>{sending?t.sending:prog()<15?`${15-prog()} ${t.remaining}`:t.submit}</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
