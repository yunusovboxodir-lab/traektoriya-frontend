function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = {

function init() {
  const shuffled = shuffle(ALL_QUESTIONS).map(q => ({
    ...q,
    shuffledOptions: shuffle(q.options.map((o, i) => ({ ...o, origIndex: i })))
  }));
  state.questions = shuffled;
  render();
}

  state.screen = 'test';
  state.currentQ = 0;

function selectAnswer(qId, i) { state.answers[qId] = i; render(); }
function nextQuestion() { if (state.currentQ < 14) { state.currentQ++; window.scrollTo(0,0); render(); } }
function prevQuestion() { if (state.currentQ > 0) { state.currentQ--; window.scrollTo(0,0); render(); } }
function goToQuestion(i) { state.currentQ = i; window.scrollTo(0,0); render(); }

function calcResults() {
  const categories = {};
  for (const cat of Object.keys(CATEGORY_NAMES)) categories[cat] = { score: 0, max: 0 };
  let totalScore = 0, maxScore = 0;
  for (const q of state.questions) {
    const ansIdx = state.answers[q.id];
    categories[q.category].max += 4;
    maxScore += 4;
    if (ansIdx !== undefined) {
      const pts = q.shuffledOptions[ansIdx].score;
      totalScore += pts;
      categories[q.category].score += pts;
    }
  }
  const result = { totalScore, maxScore, percentage: Math.round((totalScore / maxScore) * 100), categories: {} };
  for (const [key, val] of Object.entries(categories)) {
    result.categories[key] = { score: val.score, max: val.max, percentage: val.max > 0 ? Math.round((val.score / val.max) * 100) : 0 };
  }
  return result;
}

function submitTest() {
  if (Object.keys(state.answers).length < 15) return;
  state.screen = 'result';
  window.scrollTo(0, 0);
  sendToGoogle();
  render();
}

async function sendToGoogle() {
  if (state.sending || state.sent) return;
  state.sending = true;
  const r = calcResults();
  const payload = {
    name: state.formData.name, position: state.formData.position,
    dealer: state.formData.dealer, region: state.formData.region,
    testType: 'test', percentage: r.percentage,
    totalScore: r.totalScore, maxScore: r.maxScore,
    categories: {}
  };
  for (const [k, v] of Object.entries(r.categories)) payload.categories[k] = v.percentage;
  try {
    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    state.sent = true;
  } catch (e) { console.error('Send error:', e); }
  state.sending = false;
  render();
}

function renderResult(app) {
  const r = calcResults();
  const level = r.percentage >= 85 ? "A'lo" : r.percentage >= 70 ? "Yaxshi" : r.percentage >= 50 ? "O'rtacha" : "Yetarli emas";
  const lc = r.percentage >= 85 ? 'from-green-500 to-emerald-500' : r.percentage >= 70 ? 'from-blue-500 to-cyan-500' : r.percentage >= 50 ? 'from-amber-500 to-orange-500' : 'from-red-500 to-rose-500';

  app.innerHTML = `
    <div class="fade-in">
      <div class="text-center mb-6 pt-4">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-r ${lc} mb-4">
          <span class="text-3xl font-bold text-white">${r.percentage}%</span>
        </div>
        <h1 class="text-2xl font-bold mb-1">Natijangiz</h1>
        <p class="text-gray-400">${state.formData.name} • ${state.formData.position}</p>
        <p class="text-gray-500 text-sm">${state.formData.dealer} • ${state.formData.region}</p>
        <div class="inline-block mt-2 px-4 py-1 rounded-full bg-gradient-to-r ${lc} text-white text-sm font-semibold">${level}</div>
        <p class="text-gray-500 text-xs mt-2">${r.totalScore}/${r.maxScore} ball</p>
      </div>
      <div class="bg-slate-800/50 backdrop-blur-xl rounded-3xl p-6 border border-slate-700/50 mb-4">
        <h3 class="text-sm font-semibold text-gray-400 mb-4">Bosqichlar bo'yicha</h3>
        <div class="space-y-4">
          ${Object.entries(r.categories).map(([key, val]) => {
            const cat = CATEGORY_NAMES[key];
            const bc = val.percentage >= 70 ? 'bg-gradient-to-r from-green-500 to-emerald-500' : val.percentage >= 50 ? 'bg-gradient-to-r from-amber-500 to-orange-500' : 'bg-gradient-to-r from-red-500 to-rose-500';
            return `
              <div>
                <div class="flex justify-between items-center mb-1">
                  <span class="text-sm">${cat.icon} ${cat.name}</span>
                  <span class="text-sm font-semibold ${val.percentage >= 70 ? 'text-green-400' : val.percentage >= 50 ? 'text-amber-400' : 'text-red-400'}">${val.percentage}%</span>
                </div>
                <div class="w-full bg-slate-700/50 rounded-full h-2.5">
                  <div class="${bc} h-2.5 rounded-full transition-all duration-700" style="width:${val.percentage}%"></div>
                </div>
                <p class="text-xs text-gray-500 mt-0.5">${val.score}/${val.max} ball</p>
              </div>`;
          }).join('')}
        </div>
      </div>
      <div class="text-center text-sm ${state.sent ? 'text-green-400' : state.sending ? 'text-amber-400' : 'text-gray-500'} mb-4">
        ${state.sent ? '✓ Natijalaringiz bazaga saqlandi' : state.sending ? '⏳ Saqlanmoqda...' : ''}
      </div>
      <div class="flex gap-3">
        <a href="/" class="flex-1 py-3 rounded-xl border border-slate-600/50 text-gray-400 text-center hover:text-white transition-all">← Bosh sahifa</a>
        <button onclick="location.reload()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold hover:shadow-lg transition-all">Qayta topshirish</button>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
